# GygesLink — DHCP server pour usb0 (interface côté PC, USB gadget)
#
# ATTENTION : ce fichier n'est PAS utilisé au runtime.
# dnsmasq est lancé en CLI par gygeslink-network-setup.sh avec des
# flags dynamiques (gateway/no-gateway selon le mode setup).
# Ce fichier sert uniquement de documentation.
#

# Écouter uniquement sur usb0 (ne pas toucher wlan0)
interface=usb0
bind-interfaces

# Pas de résolution DNS publique depuis usb0 — tout UDP/53 est redirigé
# par iptables vers le DNSPort de Tor (5353). dnsmasq ne sert ici
# que comme serveur DHCP, pas comme résolveur DNS.
port=0

# Plage DHCP : .100 à .110 (le PC obtient en pratique toujours .100)
# Bail de 12h — suffisant pour une session de travail
dhcp-range=usb0,192.168.100.100,192.168.100.110,255.255.255.0,12h

# Passerelle par défaut = le boîtier (192.168.100.1)
# ATTENTION : cette option n'est envoyée QUE quand Tor est opérationnel
# (setup-done existe). Pendant le setup, le PC garde sa route WiFi pour
# ne pas perdre internet. Voir gygeslink-network-setup.sh pour la logique.
# dhcp-option=usb0,3,192.168.100.1

# DNS annoncé au PC = le boîtier lui-même (sera intercepté par iptables
# et redirigé vers Tor DNSPort — le PC ne résout jamais en direct)
dhcp-option=usb0,6,192.168.100.1

# GygesLink — NetworkManager : randomisation MAC WiFi
#
# Randomise l'adresse MAC de wlan0 à chaque connexion WiFi.
# Cela empêche le routeur FAI de tracker le boîtier par son adresse MAC.
# Équivalent fonctionnel de macchanger -r wlan0, mais géré par NM.

[device]
wifi.scan-rand-mac-address=yes

[connection]
wifi.cloned-mac-address=random
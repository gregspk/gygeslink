# GygesLink - NetworkManager : randomisation MAC WiFi
#
# NOTE : wlan0 est géré par netplan (macaddress: shuffle dans le yaml)
# et exclu de NetworkManager (gygeslink-unmanaged.conf).
# Cette config NM s'applique uniquement aux éventuels autres périphs WiFi.

[device]
wifi.scan-rand-mac-address=no

[connection]
wifi.cloned-mac-address=random
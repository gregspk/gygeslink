# GygesLink - NetworkManager : randomisation MAC WiFi
#
# NOTE : wlan0 est géré par NetworkManager.
# NM applique la randomisation MAC avant l'association WiFi (wifi.cloned-mac-address=random).
# Plus besoin de macchanger — la randomisation est atomique, pas de race condition.

[device]
wifi.scan-rand-mac-address=no

[connection]
wifi.cloned-mac-address=random
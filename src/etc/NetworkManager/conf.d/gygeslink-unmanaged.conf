# GygesLink — Interfaces non gérées par NetworkManager
#
# Armbian active NetworkManager par défaut. Si NetworkManager gère usb0
# ou wlan0, il va interférer avec notre configuration manuelle :
#   - usb0 : configuré manuellement par gygeslink-network-setup.sh (ip addr)
#   - wlan0 : géré par wpa_supplicant + dhclient dans gygeslink-network-setup.sh
#
# On exclut ces deux interfaces de NetworkManager pour éviter les conflits.
# NetworkManager ne les touchera pas au boot ni en runtime.

[keyfile]
unmanaged-devices=interface-name:usb0;interface-name:wlan0

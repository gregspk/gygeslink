# GygesLink — NetworkManager : interfaces non gérées
#
# usb0 : géré manuellement par gygeslink-network-setup.sh (IP statique 192.168.100.1)
# wlan0 : géré par NetworkManager (connexion WiFi via credentials wifi.conf)
#
# Toutes les autres interfaces sont gérées normalement par NM.

[keyfile]
unmanaged-devices=interface-name:usb0
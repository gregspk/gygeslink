# GygesLink — Paramètres sysctl persistants
# Appliqués au boot par systemd-sysctl.service.
# Les mêmes valeurs sont aussi appliquées en runtime dans
# gygeslink-network-setup.sh pour garantir l'ordre de boot.

# Routage IP — nécessaire pour faire transiter les paquets PC→Tor→Internet
net.ipv4.ip_forward = 1

# Désactiver IPv6 — prévient tout leak IPv6 qui bypasserait Tor
# (le PC peut avoir une adresse IPv6 native qui fuirait directement)
net.ipv6.conf.all.disable_ipv6 = 1
net.ipv6.conf.default.disable_ipv6 = 1
net.ipv6.conf.lo.disable_ipv6 = 1

# Réduire le timeout conntrack TCP (défaut : 432000s = 5 jours → 600s)
# Évite la saturation de la table conntrack sur un boîtier peu mémoire.
net.netfilter.nf_conntrack_tcp_timeout_established = 600

# Nécessaire pour WireGuard + policy routing (Tor via wg0)
net.ipv4.conf.all.src_valid_mark = 1

# GygesLink — Modules kernel à précharger au boot
# Chargés par systemd-modules-load.service (avant sysctl et réseau).
#
# nf_conntrack : nécessaire pour que les paramètres sysctl
#   net.netfilter.nf_conntrack_tcp_timeout_* soient applicables.
#   Sans ce module, sysctl tente d'écrire dans /proc/sys/net/netfilter/
#   qui n'existe pas encore → paramètres ignorés silencieusement.
#
# dwc2 : contrôleur USB OTG Allwinner H618 (mode gadget/peripheral)
#   Sans dwc2, le port USB-C ne peut pas émuler un périphérique.
#
# libcomposite : framework configfs pour USB gadget
#   Sans libcomposite, /sys/kernel/config/usb_gadget/ n'existe pas.
#
# usb_f_rndis : fonction RNDIS pour configfs
#   Sans usb_f_rndis, le script gadget ne peut pas créer functions/rndis.usb0.
#
nf_conntrack
dwc2
libcomposite
usb_f_rndis

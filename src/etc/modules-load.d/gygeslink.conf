# GygesLink — Modules kernel à précharger au boot
# Chargés par systemd-modules-load.service (avant sysctl et réseau).
#
# nf_conntrack : nécessaire pour que les paramètres sysctl
#   net.netfilter.nf_conntrack_tcp_timeout_* soient applicables.
#   Sans ce module, sysctl tente d'écrire dans /proc/sys/net/netfilter/
#   qui n'existe pas encore → paramètres ignorés silencieusement.
#
# dwc2 : contrôleur USB OTG pour Allwinner H618 (Orange Pi Zero 2W).
#   Active le mode périphérique USB (gadget mode) sur le port USB-C.
#   Sans ce module, le gadget RNDIS ne peut pas être configuré.
#
# libcomposite : framework USB composite via configfs.
#   Requis pour créer un gadget RNDIS via /sys/kernel/config/usb_gadget/.
#
# usb_f_rndis : fonction RNDIS USB (Remote NDIS Internet Sharing Device).
#   Permet à Windows de reconnaître le Pi comme carte réseau USB.
#   Requis par le gadget configfs créé par gygeslink-usb-gadget.sh.
#
nf_conntrack
dwc2
libcomposite
usb_f_rndis
# GygesLink — Configuration réseau persistante
# =====================================================================
#
# Ce fichier est chargé par gygeslink-network-setup.sh au démarrage.
# Il est stocké sur la partition /data (ext4, hors overlayfs) :
# les paramètres survivent aux reboots et aux mises à jour OS.
#
# UTILISATION :
# Décommentez et modifiez uniquement les paramètres que vous souhaitez
# personnaliser. Les valeurs par défaut sont dans gygeslink-network-setup.sh.
#
# FORMAT : variable=valeur (syntaxe bash, sourced directement)
#
# =====================================================================

# ── Timeout association WiFi (wlan0) ──────────────────────────────────
# Durée maximum d'attente pour l'association WiFi (secondes).
# Valeur par défaut : 20
#WIFI_TIMEOUT=20

# ── Timeout DHCP (wlan0, côté FAI) ────────────────────────────────────
# Durée maximum d'attente pour obtenir une IP du routeur FAI (secondes).
# Valeur par défaut : 30
#DHCP_TIMEOUT=30

# ── Note ───────────────────────────────────────────────────────────────
# Les credentials WiFi sont dans  : /data/gygeslink/wifi.conf (permissions 600)
# Les bridges obfs4 sont dans     : /data/gygeslink/bridges.conf
# La config WireGuard est dans    : /data/gygeslink/wg0.conf
# Ces fichiers sont créés automatiquement par le portail de setup.

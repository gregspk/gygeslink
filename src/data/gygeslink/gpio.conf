# GygesLink - Configuration GPIO (Orange Pi Zero 2W)
#
# Valeurs par défaut pour H618 (sysfs numbering, gpiochip1):
#   Port H base = 7*32 = 224, Port I base = 8*32 = 256
#   Tous sur gpiochip1 (base 352 dans le système)
#   sysfs utilise les numéros globaux : PH2=226, PH3=227, PI5=261, PI13=269
#
# LED RGB ANODE COMMUNE : GPIO LOW = LED ON, GPIO HIGH = LED OFF
# Broche longue → 3.3V, broches cathodes → résistances → GPIO
#
# Pinout header 26-pin Orange Pi Zero 2W :
#   Pin 1:  3.3V          Pin 2:  5V
#   Pin 3:  I2C0_SDA/PH6  Pin 4:  5V
#   Pin 5:  I2C0_SCL/PH5  Pin 6:  GND
#   Pin 7:  PI13/BUTTON   Pin 8:  UART_TX/PH2 (LED RED)
#   Pin 9:  GND            Pin 10: UART_RX/PH3 (LED GREEN)
#   Pin 11: PH9            Pin 12: PH10
#   Pin 13: PH11           Pin 14: GND
#   Pin 15: PI5 (LED BLUE) Pin 16: PH13
#   Pin 17: 3.3V           Pin 18: PH18
#   Pin 19: SPI_MOSI/PH21  Pin 20: GND
#   Pin 21: SPI_MISO/PH20  Pin 22: PH19
#   Pin 23: SPI_CLK/PH7   Pin 24: SPI_CS/PH8
#   Pin 25: GND            Pin 26: (n/c)

GPIO_R=226
GPIO_G=227
GPIO_B=261
BUTTON_LINE=269
LED_ACTIVE_LOW=true
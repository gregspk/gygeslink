# GygesLink — Configuration GPIO (Orange Pi Zero 2W / Allwinner H618)
#
# VALEURS PAR DÉFAUT pour H618 (Port H base = 7*32 = 224).
# À confirmer avec `gpioinfo gpiochip0` sur le Pi.
#
# Si les numéros de ligne diffèrent, modifier ce fichier.
# Il sera lu par gygeslink-led.py et gygeslink-button.py au démarrage.
#
# Pour vérifier :
#   gpiodetect
#   gpioinfo gpiochip0 | grep -i "PH"
#   gpioinfo gpiochip1 | grep -i "PH"
#
# Pinout header 26-pin Orange Pi Zero 2W :
#   Pin 1:  3.3V          Pin 2:  5V
#   Pin 3:  I2C0_SDA/PH6  Pin 4:  5V
#   Pin 5:  I2C0_SCL/PH5  Pin 6:  GND
#   Pin 7:  PH14          Pin 8:  UART_TX/PH2
#   Pin 9:  GND            Pin 10: UART_RX/PH3
#   Pin 11: PH9            Pin 12: PH10
#   Pin 13: PH11           Pin 14: GND
#   Pin 15: PH12           Pin 16: PH13
#   Pin 17: 3.3V           Pin 18: PH18
#   Pin 19: SPI_MOSI/PH21  Pin 20: GND
#   Pin 21: SPI_MISO/PH20  Pin 22: PH19
#   Pin 23: SPI_CLK/PH7   Pin 24: SPI_CS/PH8
#   Pin 25: GND            Pin 26: (n/c)

GPIOCHIP=gpiochip0
GPIO_R=233
GPIO_G=235
GPIO_B=236
BUTTON_LINE=238
# GygesLink — Bridges obfs4
# =====================================================================
#
# Ce fichier est chargé par /etc/tor/torrc via "%include".
# Il est stocké sur la partition /data (ext4, hors overlayfs) :
# vos bridges survivent aux reboots et aux mises à jour du système.
#
# COMMENT REMPLIR CE FICHIER :
#   1. Rendez-vous sur https://bridges.torproject.org
#      (depuis un autre appareil, sur un réseau non censuré)
#   2. Choisissez "obfs4"
#   3. Copiez 3 lignes "Bridge obfs4 ..."
#   4. Collez-les ci-dessous en remplaçant les exemples
#   5. Redémarrez le boîtier
#
# FORMAT ATTENDU (une bridge par ligne) :
#   Bridge obfs4 <IP>:<PORT> <FINGERPRINT> cert=<CERT> iat-mode=0
#
# EXEMPLE (ne pas utiliser — ces valeurs sont fictives) :
#   Bridge obfs4 198.51.100.1:443 AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA cert=BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB iat-mode=0
#
# =====================================================================
# REMPLACER LES 3 LIGNES CI-DESSOUS PAR VOS BRIDGES RÉELS :
# =====================================================================

Bridge obfs4 REMPLACER_PAR_IP:PORT REMPLACER_PAR_FINGERPRINT cert=REMPLACER_PAR_CERT iat-mode=0
Bridge obfs4 REMPLACER_PAR_IP:PORT REMPLACER_PAR_FINGERPRINT cert=REMPLACER_PAR_CERT iat-mode=0
Bridge obfs4 REMPLACER_PAR_IP:PORT REMPLACER_PAR_FINGERPRINT cert=REMPLACER_PAR_CERT iat-mode=0
